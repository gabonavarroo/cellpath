# config/default.yaml — master Hydra config.
#
# AS OF 2026-05-17, THE DEFAULT COMPOSITION REPRODUCES V2 PRIMARY
# (see `artifacts_v2/V2_FINAL_REPORT.md`):
#   * VAE:      `artifacts/vae` (V1, frozen — V2 reuses it).
#   * Pairs:    `artifacts/pairs` (V1 OT, frozen — V2 reuses it).
#   * Dynamics: `artifacts_v2/dynamics_v1ot_ror_corr010` (V2 primary, frozen).
#               Architecture: residual-over-ridge + corr-loss λ=0.10.
#   * PPO:      `artifacts_v2/rl_v1ot_ror_corr010_terminal_curric_k3_1M` (V2 primary, frozen).
#               Reward: terminal_only_step_cost; curriculum 4→10; K=3; ε=p25=3.166; 1 M ts.
#   * Eval:     `artifacts_v2/eval` and `artifacts_v2/figures` (V2 wrap-up outputs).
#
# Running `make pipeline` against the defaults LOADS the frozen V2 primary artifacts (no
# retraining). Running individual training entry points with `+force=true` overwrites the
# V2 frozen artifacts — discouraged unless you intend to redo V2.
#
# To reproduce V1 numbers, override:
#   python scripts/train_rl.py paths.dynamics_dir=artifacts/dynamics \
#     paths.rl_dir=artifacts/rl_sweeps/p50_start8_shaped_noopfix_500k \
#     rl.env.max_steps=10 rl.env.epsilon_override=null \
#     rl.reward.mode=absolute_distance rl.train.curriculum.enabled=false \
#     dynamics.use_state_linear_skip=true dynamics.use_residual_over_ridge=false \
#     dynamics.lambda_corr=0.0
#
# Composes path config + per-component configs. Override on the CLI:
#   python scripts/train_vae.py vae.n_latent=64 seed=7
# Or compose with an experiment stack:
#   python scripts/train_vae.py --config-name vae_ablation

defaults:
  - paths
  - vae
  - dynamics
  - rl
  - _self_

# ---------------------------------------------------------------------------
# Reproducibility
# ---------------------------------------------------------------------------
seed: 42                              # propagated via src.utils.seeding.set_seed

# ---------------------------------------------------------------------------
# Device
# ---------------------------------------------------------------------------
device:
  force: null                          # "cpu" | "mps" | "cuda" | null (auto-detect)

# ---------------------------------------------------------------------------
# Data + preprocessing
# ---------------------------------------------------------------------------
data:
  source: pertpy                      # "pertpy" | "scperturb" | "geo"
  min_counts: 500                     # cell QC: drop cells with < N total UMIs
  min_cells: 50                       # gene QC: drop genes detected in < N cells (50 = 0.04% of 111k cells; reduces gene count from 20k→~8k for faster seurat_v3 HVG)
  n_hvg: 2000                         # highly variable genes — fed into scVI
  hvg_flavor: seurat_v3               # uses raw counts (correct for NB likelihood)
  normalize_total: 10000              # library-size target for visualization branch
  log_transform: true                 # log1p after normalize_total

# ---------------------------------------------------------------------------
# Pairing (Agent A → Agent B handshake)
# ---------------------------------------------------------------------------
pairing:
  method: ot                          # "ot" | "random" | "mean_delta"
  ot_epsilon: 0.05                    # Sinkhorn entropic regularization
  ot_iter: 500                        # Sinkhorn max iterations
  normalize_cost: true                # divide cost matrix by median for stability
  val_cell_fraction: 0.10             # within-perturbation held-out cells (primary gate)
  ood_gene_fraction: 0.20             # held-out perturbations (OOD report)
  combo_held_out_fraction: 0.20       # held-out combinations (composition test)
  min_cells_per_perturbation: 30      # drop perturbations with fewer cells
  pair_seed: 42                       # split RNG seed (decoupled from training seed)

# ---------------------------------------------------------------------------
# Logging + monitoring
# ---------------------------------------------------------------------------
log:
  level: INFO
  tensorboard_dir: ${paths.artifacts}/tensorboard
  use_wandb: false
  wandb_project: cellpath
  wandb_entity: null
  rich_traceback: true
  log_every_n_steps: 50

# ---------------------------------------------------------------------------
# Hydra runtime overrides
# ---------------------------------------------------------------------------
hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: false                      # keep the cwd at repo root
