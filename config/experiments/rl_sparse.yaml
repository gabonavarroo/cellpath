# config/experiments/rl_sparse.yaml — ablate λ_sparse ∈ {0.01, 0.05, 0.1}.
#
# Run as multirun:
#   python scripts/train_rl.py --multirun --config-name rl_sparse

defaults:
  - /default
  - _self_

experiment:
  id: rl_sparse_lambda
  description: "Ablate RL sparsity coefficient. PPO timesteps reduced to 1e6 for budget."

# Smaller per-run budget so the sweep fits in one cluster afternoon
rl:
  ppo:
    total_timesteps: 1_000_000

hydra:
  sweeper:
    params:
      rl.reward.lambda_sparse: 0.0,0.01,0.05,0.1,0.2
      seed: 42,7,123
