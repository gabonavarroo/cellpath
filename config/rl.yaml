# config/rl.yaml — RL environment + PPO hyperparameters.
# See ARCHITECTURE.md Concepts 4 + 5 for the why behind these defaults.
#
# V2 PRIMARY DEFAULTS (see artifacts_v2/V2_FINAL_REPORT.md):
#   * V2 hard benchmark cell: K=3, ε=p25 (3.166), distance bin 8-10, OOD held-out genes.
#   * Reward: terminal_only_step_cost (mid-episode reward = 0; terminal = 1·success - β·t).
#   * Distance-bin curriculum: linear schedule from start_d=4.0 to end_d=10.0 over first 70 %.
#   * total_timesteps = 1_000_000 (1 M).
#   * `min_start_distance: 4.0` so the curriculum has room to expand from easy to hard.
#   * `skip_gate: true` because V2 V1-OT / RoR-corr010 dynamics fail the gate by design
#      (OT-pairing-noise ceiling), but ARE controllable (beam reachability 17/17). The
#      skip is logged in PROGRESS.md per CLAUDE.md §3 rule #9.

rl:
  # ----- Action space -----
  action_space:
    enable_knockout: false            # if true, requires a registered CRISPRi dataset
                                      # (otherwise raises NotImplementedError)
    include_noop: true                # final action index = NO-OP / terminate
    repeat_mask: true                 # mask genes already used in the episode

  # ----- Reference state -----
  reference:
    source: unperturbed_k562          # "unperturbed_k562" (v1) | "external_healthy" (future)
    epsilon_percentile: 25            # V2 primary: p25 = 3.166 latent units. The V2 hard
                                      # benchmark uses ε=p25; p50 (3.531) was the V1 setting.
                                      # See V2_FINAL_REPORT.md §3 for full hardness-frontier
                                      # results with this ε.

  # ----- Environment dynamics -----
  env:
    max_steps: 3                      # K — V2 primary = 3 (V2 hard benchmark; V1 used 10).
                                      # Ablate {1, 2, 3, 8} when reporting the hardness frontier.
    start_state: random_perturbation  # "random_perturbation" | "specific" | "uniform_latent"
    start_state_perturbation: null    # only used if start_state == "specific"
    distance_metric: l2               # "l2" | "cosine"
    obs_includes_step: false          # include current step idx in observation (forces non-Markov)
    obs_includes_mask: false          # include action mask in observation (sb3 handles it via info)
    n_envs: 4                         # parallel envs (lowered from 16; macOS fork+MPS deadlock risk)
    vec_env: dummy                    # "dummy" (single-process, safe) | "subproc" (multi-process)
    min_start_distance: 4.0           # V2 primary: 4.0 (curriculum start_d). The curriculum
                                      # callback (see rl.train.curriculum) later raises this
                                      # to 10.0 over the first 70 % of training. Set to "auto"
                                      # (= epsilon) for a fixed-distance run with no curriculum.
    epsilon_override: 3.1662898064    # V2 primary: ε_p25 = 3.1663 (from the V2 hard bench).
                                      # null → fall back to artifacts/vae/epsilon_success.json
                                      # (V1 p50 canonical). The override is recorded in per-run
                                      # metadata.json; the canonical JSON is NOT mutated.

  # ----- Reward -----
  reward:
    lambda_sparse: 0.05               # per-action sparsity penalty (ablate)
    lambda_unc: 0.0                   # per-action uncertainty penalty (turn on for stretch)
    success_bonus: 0.0                # optional terminal bonus on success
    failure_penalty: 0.0              # optional terminal penalty on truncation
    distance_scale: 1.0               # multiply distance term — tune if rewards are too small
    intermediate_shaping: true        # reward at every step (vs sparse terminal-only)
    # Reward mode (P0D Track B / P0E Phase 3):
    #   * "absolute_distance" — V1 default; R = -d_next - λ·1[a≠NOOP].
    #   * "delta_distance" — R = (d_prev - d_next) - λ·1[a≠NOOP]; per-step progress shaping.
    #   * "terminal_only_step_cost" — V2 PRIMARY; R = 0 mid-episode; R_T = 1·success - β·t at
    #     terminal/truncation. Decisively outperformed delta and absolute on V2 hard bench
    #     (B5 + C2 winners both use this mode).
    #   * "hybrid_delta_terminal" — α·(d_prev - d_next) + B·1[success] at terminal. Sweep at
    #     α=1, B=10 produced 0.82 training-side success but only 0.17 on hard-bench primary
    #     cell (generalisation failure; see V2_FINAL_REPORT.md §5.3).
    mode: terminal_only_step_cost     # V2 primary
    beta_step_cost: 0.05              # V2 primary: 0.05 (penalty per step at terminal).
    # P0E Phase 3 — hybrid_delta_terminal mode params.
    # R_t = hybrid_alpha · (d_prev - d_next); R_T += hybrid_terminal_bonus · 1[success].
    hybrid_alpha: 1.0
    hybrid_terminal_bonus: 1.0
    # V3B Phase 2 — safety_aware mode params (Variant C of V3B_BIOREALISTIC_CONTROL_OBJECTIVE_PLAN.md §4).
    # R_T = 1·is_success - β·t - λ_tox·tox_path - λ_ce·common_essential_count
    # Activate by setting `mode: safety_aware` and pointing safety_table_path at the V3B biology
    # layer parquet built by scripts/build_v3b_biology_layer.py. When mode != safety_aware,
    # these knobs are inert. λ defaults chosen per plan §4 Variant C; tune in Phase 2 only after
    # baseline single-axis run shows directional signal.
    lambda_tox: 0.10
    lambda_ce: 0.05
    safety_table_path: null           # e.g. "artifacts_v3/v3b_biology/gene_safety.parquet"
    permute_chronos: false            # V3B Phase 2 null control — set true for the permuted PPO_C run
    permute_chronos_seed: 42
    # V3B Phase 3 — path_length_freeband mode params (Variant B of V3B_BIOREALISTIC_CONTROL_OBJECTIVE_PLAN.md §6.3).
    # R_T = success_bonus·1[is_success] − path_penalty(T) where path_penalty has 3 regions:
    #   T ≤ free_steps                : 0          (free band — empirically anchored composability)
    #   free_steps < T ≤ mild_until   : mild_beta·(T − free_steps)
    #   T > mild_until                : mild_beta·(mild_until − free_steps) + heavy_beta·(T − mild_until)
    # Activate by setting `mode: path_length_freeband` (typically with env.max_steps=8 to allow exploration).
    # When mode != path_length_freeband, these knobs are inert. Defaults per plan §6.3 + Phase 3 brief.
    freeband:
      free_steps: 3                   # 0 penalty up through T=3 (anchored by Norman K=2 + 1 plausible step)
      mild_until: 5                   # mild slope through T=4, 5
      mild_beta: 0.02                 # 0.02 per step in the mild band → 0.02 at T=4, 0.04 at T=5
      heavy_beta: 0.10                # 0.10 per step beyond T=5 → 0.14 at T=6, 0.34 at T=8
      success_bonus: 1.0              # terminal bonus when within ε of z_ref
    # V3B Phase 4 — uncertainty + fused reward knobs (Variant D, B+C, B+C+D).
    # The path-aware uncertainty term `lambda_unc_path · unc_path_max` is INDEPENDENT of
    # the existing V1 `lambda_unc` (per-step σ-L2 in absolute_distance mode). Active when
    # `mode ∈ {uncertainty_aware, biorealistic_fused, multi_objective}`.
    lambda_unc_path: 0.05
    uncertainty_reduce: mean_sigma     # mean_sigma | max_sigma | mean_log_var
    uncertainty_clip_min: -5.0
    uncertainty_clip_max: 3.0

  # ----- PPO (MaskablePPO from sb3-contrib) -----
  ppo:
    total_timesteps: 1_000_000        # V2 primary: 1 M (saturates the K=3 primary cell; B5
                                      # mean_final_d shrinks 2.87 @ 500k → 2.55 @ 1M). Set
                                      # 2_000_000 only when reproducing V1 (K=10, p50).
    n_steps: 1024                     # rollout length per env
    batch_size: 256                   # PPO minibatch
    n_epochs: 10                      # PPO inner epochs
    lr: 3e-4
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    clip_range_vf: null
    ent_coef: 0.01                    # entropy bonus
    vf_coef: 0.5
    max_grad_norm: 0.5
    target_kl: null                   # set 0.01 for tighter PPO
    use_sde: false
    policy: MlpPolicy
    policy_kwargs:
      net_arch: [128, 128]
      activation_fn: tanh

  # ----- Training behavior -----
  train:
    eval_freq: 50_000                 # env steps
    n_eval_episodes: 50
    save_freq: 100_000
    skip_gate: true                   # TEMPORARY: bypass dynamics gate (P0 warning logged).
                                      # Revert to false once train_dynamics.py wires dynamics_validation_gate().
    smoke_with_untrained_dynamics: false  # if true, init untrained dynamics for pipeline smoke (METRICS MEANINGLESS)
    log_action_distribution_every: 10_000

    # P0D Track B — distance-bin curriculum (V2 primary: ENABLED). The curriculum starts
    # PPO at easy bin 4–6 and progressively moves toward the hard bin 8–10 OOD primary
    # cell. Without it, B5/C2 collapse to NOOP at step 0 because the terminal-only signal
    # is too sparse at K=3 / bin 8–10. With it, B5 reaches 1.000 at primary, C2 0.941 ± 0.048.
    curriculum:
      enabled: true                    # V2 primary: enabled
      start_d: 4.0
      end_d: 10.0
      end_fraction: 0.7
      apply_threshold: 0.25            # min Δd before pool is re-filtered
      check_every: 10_000

  # ----- Evaluation -----
  eval:
    n_rollout_episodes: 500
    deterministic: false              # stochastic rollouts capture exploration variety
    save_rollouts_parquet: true
